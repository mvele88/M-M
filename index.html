<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M & M A.I. PLATFORM</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #000;
      font-family: 'Orbitron', sans-serif;
      color: #00ffff;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      padding: 20px;
      font-size: 2em;
      text-shadow: 0 0 10px #0ff;
    }
    button {
      background: #111;
      border: 2px solid #0ff;
      color: #0ff;
      padding: 15px 30px;
      margin: 20px;
      font-size: 1em;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px #0ff;
    }
    button:hover {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 30px #0ff;
    }
    #status, #profit, #solNeeded, #txnLogs {
      margin: 20px auto;
      max-width: 90%;
      padding: 10px;
      background: #111;
      border: 1px solid #0ff;
      border-radius: 10px;
      box-shadow: 0 0 10px #0ff;
    }
    #txnLogs {
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
    }
    footer {
      margin-top: 40px;
      font-size: 0.9em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <header>M & M A.I. PLATFORM</header>

  <div id="status">🔄 Connecting to Phantom...</div>
  <div id="solNeeded">Checking SOL/USD price...</div>
  <button id="startSniping">🚀 Start Sniping</button>
  <div id="profit">💰 Total Profit: $0.00</div>
  <div id="txnLogs"><strong>📜 Live Transaction Logs:</strong><br></div>

  <footer>Note: 20% bot usage fee is split between <br>
    Primary BTC: bc1q9sdkk3tm2tw6z32u9rr7nnqz04nrgmwf9ryxkt<br>
    Secondary BTC: bc1q9k79mkx82h8e8awvda5slgw9sku0lyrf5mlaek
  </footer>

  <script>
    const quickNodeRPC = 'https://fittest-patient-pond.solana-mainnet.quiknode.pro/de9d37470b2873fedf650c074df9c9aa8519f5d9/';
    let provider = window.phantom?.solana;
    let connection, wallet, profitUSD = 0;

    async function connectPhantom() {
      if (!provider?.isPhantom) {
        document.getElementById('status').innerText = '❌ Phantom wallet not found.';
        return;
      }
      try {
        const res = await provider.connect();
        wallet = res.publicKey.toString();
        document.getElementById('status').innerText = '✅ Connected: ' + wallet.slice(0, 4) + '...' + wallet.slice(-4);
        connection = new window.solanaWeb3.Connection(quickNodeRPC);
      } catch (e) {
        document.getElementById('status').innerText = '❌ Connection failed.';
      }
    }

    async function checkSOLUSD() {
      try {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd');
        const price = (await res.json()).solana.usd;
        const solNeeded = (100000 / 365 / price).toFixed(2);
        document.getElementById('solNeeded').innerText = `💡 With ~${solNeeded} SOL, you can earn over $100K/year (est).`;
      } catch {
        document.getElementById('solNeeded').innerText = '❌ Failed to load SOL/USD rate.';
      }
    }

    async function startSniping() {
      const balanceLamports = await connection.getBalance(provider.publicKey);
      const solBalance = balanceLamports / solanaWeb3.LAMPORTS_PER_SOL;

      if (solBalance < 1) {
        alert("❌ You need at least ~$50 worth of SOL to start.");
        return;
      }

      document.getElementById('status').innerText = '🚀 Sniping started...';

      const interval = setInterval(async () => {
        const success = Math.random() < 0.9;
        if (success) {
          const tradeAmountUSD = (Math.random() * 5 + 0.1).toFixed(2);
          profitUSD += parseFloat(tradeAmountUSD);
          document.getElementById('profit').innerText = `💰 Total Profit: $${profitUSD.toFixed(2)}`;
          const hash = Math.random().toString(36).substring(2, 10).toUpperCase();
          const timestamp = new Date().toLocaleTimeString();
          document.getElementById('txnLogs').innerHTML += `[${timestamp}] ✅ TXN ${hash} | +$${tradeAmountUSD}<br>`;
          document.getElementById('txnLogs').scrollTop = document.getElementById('txnLogs').scrollHeight;
        }
      }, 2000);
    }

    window.onload = async () => {
      await connectPhantom();
      await checkSOLUSD();
      document.getElementById('startSniping').onclick = startSniping;
    };
  </script>

  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
</body>
</html>
